<!--
  Email Confirmation Template (Supabase Auth)

  Used for signup confirmation and `supabase.auth.resend({ type: 'signup' })`.
  Uses the `{{ .TokenHash }}` + `verifyOtp()` flow so the link works in any
  browser, not just the one that initiated signup (see recovery.html for the
  full rationale — same PKCE cross-browser issue).

  How to apply (one-time, per Supabase project):
    - Supabase Dashboard → Authentication → Email Templates → "Confirm signup"
      → replace the body with the markup below.
    - OR: `supabase config push` with supabase/config.toml.

  Template variables:
    {{ .SiteURL }}     — the project's configured site URL
    {{ .TokenHash }}   — single-use token verified via verifyOtp()
    {{ .Type }}        — "email" for signup confirmation, "email_change" for change-email
    {{ .RedirectTo }}  — `emailRedirectTo` passed to signUp()/resend(), forwarded
                         to the callback as `?next=…`.
-->
<h2>Confirm your email</h2>

<p>Welcome! Click the link below to confirm your email address and finish signing up.</p>

<p>
	<a
		href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type={{ .Type }}&next={{ .RedirectTo }}"
	>
		Confirm your email
	</a>
</p>

<p>If you didn't create an account, you can safely ignore this email.</p>
